version: "2"
sql:
  - schema: "sql/schema"
    queries: "sql/queries"
    engine: "postgresql"
    gen:
      go:
        package: "database"
        out: "internal/database"
        emit_json_tags: true
        json_tags_case_style: "snake"
        overrides:
          - db_type: "pg_catalog.timestamptz"
            nullable: true
            go_type: "*time.Time"